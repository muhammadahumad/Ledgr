<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invalid Invitation — LEDGR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0e17;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111827;border:1px solid #1f2d45;border-radius:14px;padding:40px;text-align:center;max-width:380px}
.icon{font-size:48px;margin-bottom:16px}
h2{color:#e2e8f0;font-size:18px;margin-bottom:10px}
p{color:#64748b;font-size:13px;line-height:1.7;margin-bottom:20px}
a{display:inline-block;padding:10px 24px;background:#10b981;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔗</div>
  <h2>Invitation Invalid</h2>
  <p>{{ reason }}</p>
  <a href="/login">Go to Login</a>
</div>
</body>
</html>
