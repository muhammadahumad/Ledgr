<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — LEDGR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#111827;border:1px solid #1f2d45;border-radius:16px;padding:40px;width:100%;max-width:400px}
.brand{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;letter-spacing:.08em;margin-bottom:4px}
.brand span{color:#10b981}
.sub{font-size:12px;color:#4a6080;margin-bottom:28px}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:10px;color:#4a6080;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fl input{width:100%;padding:9px 12px;border:1px solid #1f2d45;border-radius:8px;font-size:13px;color:#e2e8f0;background:#0a0e17;font-family:'IBM Plex Sans',sans-serif;transition:border-color .15s}
.fl input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12)}
.btn{width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#10b981;color:#fff;font-family:'IBM Plex Sans',sans-serif;letter-spacing:.02em;transition:background .15s}
.btn:hover{background:#059669}
.link{text-align:center;margin-top:16px;font-size:12px;color:#4a6080}
.link a{color:#10b981}
.err{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
</style>
</head>
<body>
<div class="box">
  <div class="brand">L<span>EDGR</span></div>
  <p class="sub">AI-powered Business Financial OS</p>
  {% with messages=get_flashed_messages(with_categories=true) %}
    {% for _,msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="fl"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required autofocus></div>
    <div class="fl"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn">Sign in</button>
  </form>
  <div class="link">No account? <a href="/register">Create free workspace</a></div>
</div>
</body>
</html>
