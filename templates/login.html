<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — LEDGR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#f1f5f9;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:400px}
.brand{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.brand span{color:#10b981}
.subtitle{font-size:13px;color:#64748b;margin-bottom:28px}
.field-group{margin-bottom:16px}
.field-label{font-size:11px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.field-input{width:100%;padding:9px 12px;border:1px solid #334155;border-radius:8px;font-size:14px;color:#f1f5f9;background:#0f172a;font-family:inherit}
.field-input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.btn{width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:#10b981;color:#fff;font-family:inherit;transition:background .15s}
.btn:hover{background:#059669}
.link-row{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link-row a{color:#10b981}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;background:rgba(220,38,38,.1);color:#f87171;border:1px solid rgba(220,38,38,.2)}
</style>
</head>
<body>
<div class="box">
  <div class="brand">L<span>EDGR</span></div>
  <p class="subtitle">AI-powered business financial OS</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field-group">
      <div class="field-label">Email</div>
      <input class="field-input" type="email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="field-group">
      <div class="field-label">Password</div>
      <input class="field-input" type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Sign in</button>
  </form>

  <div class="link-row">
    Don't have an account? <a href="/register">Create one free</a>
  </div>
</div>
</body>
</html>
